###
### mkdocs-plugins.yml
###

plugins:
  - awesome-pages
  - meta
  - git-committers:
      branch: main
      docs_path: Labs
      enabled: true
      repository: nirgeier/AI-K8S-MCP
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      fallback_to_build_date: true
      locale: en
      timezone: UTC
      type: date
  - search:
      separator: "[\\s\\u200b\\-_,:!=\\[\\]()\"`/]+|\\.(?!\\d)|&[lg]t;|(?!\\b)(?=[A-Z\
        ][a-z])"
